name: Build & Deploy Termux APT Repo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install termux-apt-repo
          sudo apt-get update
          sudo apt-get install -y dpkg xz-utils

      - name: Build .deb
        run: |
          chmod +x whale-agent/data/data/com.termux/files/usr/bin/whale
          dpkg-deb -Zgzip --build whale-agent
          echo "=== .deb contents ==="
          dpkg-deb --contents whale-agent.deb
          echo "=== .deb info ==="
          dpkg-deb --info whale-agent.deb
          mkdir -p termux-repo/debs
          mv whale-agent.deb termux-repo/debs/

      - name: Generate APT repo
        run: |
          echo "=== Debug: .deb file ==="
          file termux-repo/debs/whale-agent.deb
          python3 -c "
import tarfile, sys
try:
    # .deb is ar archive, try reading control
    import subprocess
    r = subprocess.run(['dpkg-deb', '--info', 'termux-repo/debs/whale-agent.deb'], capture_output=True, text=True)
    print('stdout:', r.stdout[:500])
    print('stderr:', r.stderr[:500])
except Exception as e:
    print(f'Error: {e}')
"
          termux-apt-repo termux-repo/debs termux-repo/repo stable main
          echo "=== Generated structure ==="
          find termux-repo/repo -type f

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: termux-repo/repo

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
