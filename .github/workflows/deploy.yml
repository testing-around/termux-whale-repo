name: Build & Deploy Termux APT Repo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg

      - name: Build .deb
        run: |
          chmod +x whale-agent/data/data/com.termux/files/usr/bin/whale
          dpkg-deb --build whale-agent
          echo "=== .deb contents ==="
          dpkg-deb --contents whale-agent.deb
          echo "=== .deb info ==="
          dpkg-deb --info whale-agent.deb
          mkdir -p termux-repo/debs
          mv whale-agent.deb termux-repo/debs/

      - name: Generate APT repo
        run: |
          python3 build_repo.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy root files to repo
        run: |
          cp install.sh termux-repo/repo/
          cp README.md termux-repo/repo/
          cp DEPLOY_CHECKLIST.md termux-repo/repo/
          cp TEST_PLAN.md termux-repo/repo/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: termux-repo/repo

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
